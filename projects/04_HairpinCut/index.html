<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>04 Hairpin Cut | Holistic 미디어아트</title>
  <link rel="stylesheet" href="style.css">
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <!-- 구글 Holistic(얼굴 + 손 + 몸통 통합) 모델 로드 -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
  
  <!-- 폴리곤 자르기용 ClipperLib 로드 -->
  <script src="https://cdn.jsdelivr.net/npm/clipper-lib@6.4.2/clipper.js"></script>
  
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div class="container">
    <div class="loading" id="loadingText">얼굴과 두 손을 모두 추적하기 위해 AI 모델을 불러옵니다...<br>(화면에 손과 얼굴이 모두 나오게 서주세요!)</div>
    <!-- 실시간 상태값을 시각적으로 보여줄 디버깅 전용 패널 추가 -->
    <div id="debugHUD" class="debug-hud">
       <h3 style="margin-top:0;">📡 디버그 모니터</h3>
       <div id="debugFace">얼굴 추적: 대기중</div>
       <div id="debugHand">손 추적: 대기중</div>
       <div id="debugGesture">동작: 없음</div>
       <div id="debugLog" style="color:#ffea00; margin-top:10px;">가위질 방향/컷팅 감지 로그...</div>
    </div>
    
    <video class="input_video" autoplay playsinline></video>
    <canvas class="output_canvas" width="1280" height="720"></canvas>
  </div>
  
  <script type="module" src="app.js"></script>
</body>
</html>
